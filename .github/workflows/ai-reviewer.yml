name: AI Code Reviewer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2 # Penting untuk mengambil diff

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Generate Code Diff
      run: git diff HEAD^ HEAD > changes.diff

    - name: Run Gemini Reviewer
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node system/lib/ai-reviewer.js
